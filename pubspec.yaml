name: macropeek
description: "MacroPeek AI — AI-powered nutrition tracking app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.2.0

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  google_sign_in: ^7.2.0

  # Camera + image
  camera: ^0.12.0+1
  image_picker: ^1.1.2

  # Local flags (onboarding seen flag only)
  shared_preferences: ^2.3.2

  # HTTP (Gemini API)
  http: ^1.2.2

  # Utils
  intl: ^0.20.1
  path_provider: ^2.1.4

  # Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^4.0.3
  # custom_lint + riverpod_lint skipped — custom_lint 0.8.1 (analyzer ^8.x)
  # conflicts with riverpod_lint 3.1.x (analyzer ^9.x). Add back in Batch 10.

flutter:
  uses-material-design: true
